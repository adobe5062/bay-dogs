<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Color tokens ──────────────────────────────────────────────
const C = {
  orange: '#f7941d',
  orangeDark: '#e07d0a',
  navy: '#0d1b2a',
  navyMid: '#162334',
  offWhite: '#faf8f4',
  warm: '#fff8f0',
};

const HEADING_FONTS = {
  montserrat: "'Montserrat', sans-serif",
  playfair: "'Playfair Display', serif",
  oswald: "'Oswald', sans-serif",
};

const ABOUT_BGS = {
  offwhite: '#faf8f4',
  orange: '#f7941d',
  navy: '#0d1b2a',
};

// ── Tweaks defaults ───────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#1d9ff7",
  "darkNav": true,
  "showBanner": true,
  "heroStyle": "dark",
  "buttonRadius": 10,
  "fontStyle": "montserrat",
  "aboutBg": "offwhite",
  "statsVisible": true
}/*EDITMODE-END*/;

// ── Logo SVG ──────────────────────────────────────────────────
function BayDogsLogo({ size = 44 }) {
  return (
    <svg width={size * 2.4} height={size} viewBox="0 0 110 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* Circle bg */}
      <circle cx="22" cy="22" r="20" fill={C.navy} />
      {/* Wave */}
      <path d="M8 26 Q13 20 18 26 Q23 32 28 26 Q33 20 36 24" stroke="#2ec4e8" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M6 29 Q11 23 16 29 Q21 35 26 29 Q31 23 36 27" stroke="#1a9fc4" strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.6"/>
      {/* Sun */}
      <circle cx="22" cy="13" r="6" fill={C.orange} />
      <path d="M22 4 L22 7" stroke={C.orange} strokeWidth="1.5" strokeLinecap="round"/>
      <path d="M31 13 L28 13" stroke={C.orange} strokeWidth="1.5" strokeLinecap="round"/>
      <path d="M29 7 L27 9" stroke={C.orange} strokeWidth="1.5" strokeLinecap="round"/>
      <path d="M15 7 L17 9" stroke={C.orange} strokeWidth="1.5" strokeLinecap="round"/>
      {/* Text */}
      <text x="48" y="17" fontFamily="Montserrat,sans-serif" fontWeight="800" fontSize="12" fill={C.navy} letterSpacing="2">BAY</text>
      <text x="48" y="32" fontFamily="Montserrat,sans-serif" fontWeight="800" fontSize="12" fill={C.orange} letterSpacing="2">DOGS</text>
    </svg>
  );
}

// ── Reveal hook ───────────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

// ── Pill badge ────────────────────────────────────────────────
function Badge({ children, accent }) {
  return (
    <span style={{
      display: 'inline-block', padding: '4px 14px', borderRadius: 99,
      background: accent ? C.orange : 'rgba(247,148,29,0.12)',
      color: accent ? '#fff' : C.orange,
      fontFamily: 'Montserrat', fontWeight: 600, fontSize: 11, letterSpacing: 1,
      textTransform: 'uppercase',
    }}>{children}</span>
  );
}

// ── Section label ─────────────────────────────────────────────
function SectionLabel({ children }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
      <div style={{ width: 32, height: 3, background: C.orange, borderRadius: 2 }} />
      <span style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 11, letterSpacing: 2.5, textTransform: 'uppercase', color: C.orange }}>{children}</span>
    </div>
  );
}

// ── Image placeholder ─────────────────────────────────────────
function ImgPlaceholder({ label, w = '100%', h = 320, radius = 16, dark = false }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: radius,
      background: dark ? 'repeating-linear-gradient(45deg,#1a2a3a,#1a2a3a 8px,#162030 8px,#162030 16px)'
                       : 'repeating-linear-gradient(45deg,#e8e2d8,#e8e2d8 8px,#ddd7cc 8px,#ddd7cc 16px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.28)',
      fontSize: 12, fontFamily: 'monospace', textAlign: 'center', padding: 20,
      flexShrink: 0,
    }}>{label}</div>
  );
}

// ══════════════════════════════════════════════════
// NAVBAR
// ══════════════════════════════════════════════════
function Navbar({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [active, setActive] = useState('home');

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = ['home','about','trainer','services','testimonials','contact'];
  const labels = { home:'Home', about:'About', trainer:'Meet the Trainer', services:'Services', testimonials:'Testimonials', contact:'Contact' };

  const scrollTo = (id) => {
    setActive(id);
    setMenuOpen(false);
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };

  const navBg = scrolled
    ? C.navy
    : 'linear-gradient(to bottom, rgba(13,27,42,0.75) 0%, rgba(13,27,42,0) 100%)';
  const navShadow = scrolled ? '0 2px 24px rgba(0,0,0,0.3)' : 'none';

  return (
    <>
    <nav style={{
      position: 'fixed', top: tweaks.showBanner ? 40 : 0, left: 0, right: 0, zIndex: 1000,
      background: navBg, boxShadow: navShadow,
      transition: 'box-shadow 0.4s ease',
      padding: '0 clamp(16px, 4vw, 40px)', height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <div onClick={() => scrollTo('home')} style={{ cursor: 'pointer' }}>
        <BayDogsLogo size={36} />
      </div>

      {/* Desktop links */}
      <div className="nav-desktop" style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        {links.map(id => (
          <button key={id} onClick={() => scrollTo(id)} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: '8px 14px',
            fontFamily: 'Montserrat', fontWeight: 600, fontSize: 12, letterSpacing: 1.2,
            textTransform: 'uppercase',
            color: active === id ? tweaks.accentColor : 'rgba(255,255,255,0.85)',
            borderBottom: active === id ? `2px solid ${tweaks.accentColor}` : '2px solid transparent',
            transition: 'all 0.2s',
          }}
            onMouseEnter={e => { if (active !== id) e.currentTarget.style.color = '#fff'; }}
            onMouseLeave={e => { if (active !== id) e.currentTarget.style.color = 'rgba(255,255,255,0.85)'; }}
          >{labels[id]}</button>
        ))}
        <button onClick={() => scrollTo('contact')} style={{
          marginLeft: 12, padding: '10px 22px', background: tweaks.accentColor, color: '#fff',
          border: 'none', borderRadius: 8, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 12,
          letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer',
          transition: 'all 0.2s', animation: 'pulseGlow 2.5s infinite',
        }}
          onMouseEnter={e => e.currentTarget.style.background = C.orangeDark}
          onMouseLeave={e => e.currentTarget.style.background = tweaks.accentColor}
        >Free Consult</button>
      </div>

      {/* Mobile hamburger */}
      <button className="nav-mobile" onClick={() => setMenuOpen(o => !o)} style={{
        background: 'none', border: 'none', cursor: 'pointer', padding: 8,
        display: 'flex', flexDirection: 'column', gap: 5,
      }}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width: 24, height: 2.5, background: '#fff', borderRadius: 2,
            transition: 'all 0.3s',
            transform: menuOpen
              ? i === 0 ? 'rotate(45deg) translate(5px, 5px)'
              : i === 1 ? 'scaleX(0)'
              : 'rotate(-45deg) translate(5px, -5px)'
              : 'none',
          }} />
        ))}
      </button>

      {/* Mobile menu drawer */}
      {menuOpen && (
        <div style={{
          position: 'fixed', top: tweaks.showBanner ? 108 : 68, left: 0, right: 0,
          background: C.navy, padding: '16px 0 24px',
          boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
          display: 'flex', flexDirection: 'column', alignItems: 'stretch',
          zIndex: 999,
        }}>
          {links.map(id => (
            <button key={id} onClick={() => scrollTo(id)} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '14px 32px', textAlign: 'left',
              fontFamily: 'Montserrat', fontWeight: 600, fontSize: 14, letterSpacing: 1,
              textTransform: 'uppercase',
              color: active === id ? tweaks.accentColor : 'rgba(255,255,255,0.8)',
              borderLeft: active === id ? `3px solid ${tweaks.accentColor}` : '3px solid transparent',
            }}>{labels[id]}</button>
          ))}
          <div style={{ padding: '8px 32px 0' }}>
            <button onClick={() => scrollTo('contact')} style={{
              width: '100%', padding: '14px', background: tweaks.accentColor, color: '#fff',
              border: 'none', borderRadius: 8, fontFamily: 'Montserrat', fontWeight: 700,
              fontSize: 13, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer',
            }}>Free Consultation</button>
          </div>
        </div>
      )}
    </nav>

    <style>{`
      @media (max-width: 768px) { .nav-desktop { display: none !important; } .nav-mobile { display: flex !important; } }
      @media (min-width: 769px) { .nav-mobile { display: none !important; } }
    `}</style>
    </>
  );
}

// ══════════════════════════════════════════════════
// BANNER
// ══════════════════════════════════════════════════
function Banner({ tweaks }) {
  if (!tweaks.showBanner) return null;
  const msg = '✦ Visit the CONTACT page to set up a FREE phone consultation now!  ✦  Bay Dogs Dog Training — Anne Arundel County, MD  ✦  Over 15 years of experience  ';
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1001,
      background: tweaks.accentColor, height: 40, overflow: 'hidden',
      display: 'flex', alignItems: 'center',
    }}>
      <div style={{
        display: 'flex', whiteSpace: 'nowrap',
        animation: 'bannerScroll 22s linear infinite',
        fontFamily: 'Montserrat', fontWeight: 600, fontSize: 12,
        letterSpacing: 0.8, color: '#fff',
      }}>
        <span style={{ paddingRight: 60 }}>{msg}</span>
        <span style={{ paddingRight: 60 }}>{msg}</span>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// HERO
// ══════════════════════════════════════════════════
function Hero({ tweaks }) {
  return (
    <section id="home" style={{ position: 'relative', height: '100vh', minHeight: 600, overflow: 'hidden' }}>
      {/* BG photo */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'url(https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=1800&auto=format&fit=crop)',
        backgroundSize: 'cover', backgroundPosition: 'center 30%',
      }} />
      {/* Overlay gradient */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(120deg, rgba(13,27,42,0.88) 45%, rgba(13,27,42,0.35) 100%)',
      }} />
      {/* Animated wave circles */}
      {[1,2,3].map(i => (
        <div key={i} style={{
          position: 'absolute', right: `${8 + i * 6}%`, bottom: `${10 + i * 5}%`,
          width: i * 180, height: i * 180, borderRadius: '50%',
          border: `2px solid rgba(247,148,29,${0.15 - i * 0.03})`,
          animation: `waveFloat ${3 + i}s ease-in-out infinite`,
          animationDelay: `${i * 0.4}s`,
        }} />
      ))}

      {/* Hero image — right panel */}
      <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: '55%' }}>
        <div style={{
          width: '100%', height: '100%',
          backgroundImage: 'url(https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=1200&auto=format&fit=crop)',
          backgroundSize: 'cover', backgroundPosition: 'center',
          clipPath: 'polygon(15% 0, 100% 0, 100% 100%, 0% 100%)',
        }} />
      </div>

      {/* Content */}
      <div style={{
        position: 'relative', zIndex: 2, height: '100%', display: 'flex', flexDirection: 'column',
        justifyContent: 'center', paddingLeft: 'clamp(32px, 8vw, 120px)', maxWidth: 620,
        animation: 'fadeUp 0.9s ease forwards',
      }}>
        <Badge>Bay Dogs • Maryland</Badge>
        <h1 style={{
          fontFamily: HEADING_FONTS[tweaks.fontStyle] || HEADING_FONTS.montserrat, fontWeight: 900, fontSize: 'clamp(42px, 6vw, 76px)',
          lineHeight: 1.05, color: '#fff', marginTop: 20, marginBottom: 20,
          textWrap: 'pretty',
        }}>
          Relationship<br/>coaching for<br/><span style={{ color: tweaks.accentColor }}>you & your dog.</span>
        </h1>
        <p style={{
          fontFamily: 'Inter', fontWeight: 300, fontSize: 18, lineHeight: 1.7,
          color: 'rgba(255,255,255,0.75)', maxWidth: 420, marginBottom: 36,
        }}>
          Strengthen your bond. Communicate clearly.<br/>Watch your dog thrive.
        </p>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
          <button onClick={() => document.getElementById('services').scrollIntoView({ behavior: 'smooth' })} style={{
            padding: '16px 36px', background: tweaks.accentColor, color: '#fff',
            border: 'none', borderRadius: tweaks.buttonRadius, fontFamily: 'Montserrat', fontWeight: 700,
            fontSize: 14, letterSpacing: 1.2, textTransform: 'uppercase', cursor: 'pointer',
            transition: 'transform 0.2s, background 0.2s',
          }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.background = C.orangeDark; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.background = tweaks.accentColor; }}
          >View Services</button>
          <button onClick={() => document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })} style={{
            padding: '16px 36px', background: 'transparent', color: '#fff',
            border: '2px solid rgba(255,255,255,0.4)', borderRadius: tweaks.buttonRadius, fontFamily: 'Montserrat',
            fontWeight: 700, fontSize: 14, letterSpacing: 1.2, textTransform: 'uppercase', cursor: 'pointer',
            transition: 'border-color 0.2s, transform 0.2s',
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = tweaks.accentColor; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(255,255,255,0.4)'; e.currentTarget.style.transform = ''; }}
          >Free Consultation</button>
        </div>

        {/* Stats row */}
        {tweaks.statsVisible !== false && <div style={{ display: 'flex', gap: 40, marginTop: 52 }}>
          {[['15+', 'Years Experience'], ['1,000+', 'Dogs Trained'], ['100%', 'Owner Commitment']].map(([num, label]) => (
            <div key={num}>
              <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 28, color: tweaks.accentColor }}>{num}</div>
              <div style={{ fontFamily: 'Inter', fontSize: 12, color: 'rgba(255,255,255,0.55)', letterSpacing: 0.5 }}>{label}</div>
            </div>
          ))}
        </div>}
      </div>

      {/* Scroll indicator */}
      <div style={{
        position: 'absolute', bottom: 32, left: '50%', transform: 'translateX(-50%)',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
        animation: 'fadeIn 1.5s ease 1s both',
      }}>
        <span style={{ fontFamily: 'Montserrat', fontSize: 10, letterSpacing: 2, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase' }}>Scroll</span>
        <div style={{
          width: 24, height: 38, border: '2px solid rgba(255,255,255,0.3)', borderRadius: 12,
          display: 'flex', justifyContent: 'center', paddingTop: 6,
        }}>
          <div style={{
            width: 4, height: 8, background: tweaks.accentColor, borderRadius: 2,
            animation: 'fadeUp 1.2s ease infinite',
          }} />
        </div>
      </div>
    </section>
  );
}

// ABOUT
// ══════════════════════════════════════════════════
function About({ tweaks }) {
  const pillars = [
    { icon: '🤝', title: 'Strong Relationship', desc: 'Built on trust and mutual respect between you and your dog.' },
    { icon: '💬', title: 'Clear Communication', desc: 'Learn to speak your dog\'s language and be understood.' },
    { icon: '🎯', title: 'Owner Commitment', desc: 'Long-term success depends on you — we coach both of you.' },
    { icon: '🎉', title: 'Actually Fun', desc: 'Training should be enjoyable — for you and your pup.' },
  ];

  return (
    <section id="about" style={{ background: ABOUT_BGS[tweaks.aboutBg] || C.offWhite, padding: '100px 0' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 40px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center' }}>
          {/* Left: text */}
          <div className="reveal-left">
            <SectionLabel>About Bay Dogs</SectionLabel>
            <h2 style={{ fontFamily: HEADING_FONTS[tweaks.fontStyle] || HEADING_FONTS.montserrat, fontWeight: 800, fontSize: 'clamp(32px,4vw,52px)', lineHeight: 1.1, color: tweaks.aboutBg === 'navy' ? '#fff' : C.navy, marginBottom: 24 }}>
              A dog training experience<br/><span style={{ color: tweaks.accentColor }}>like no other.</span>
            </h2>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#444', marginBottom: 20 }}>
              Training dogs is easy. <em>Maintaining the results</em> is the tricky part. Long-term success boils down to one important factor: <strong>YOU!</strong>
            </p>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#444', marginBottom: 32 }}>
              At Bay Dogs, we focus on the core fundamentals of owning a well-behaved dog. Once you and your dog are on the same page, you'll be able to transform their behavior with ease — and enjoy life with your dog to the fullest.
            </p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
              {['Puppy Training','House Training','Obedience','Behavior Modification','Separation Anxiety','Leash Reactivity','Senior Dog Training'].map(s => (
                <Badge key={s}>{s}</Badge>
              ))}
            </div>
          </div>

  const Row = ({ label, children }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontFamily: 'Montserrat', fontSize: 10, color: 'rgba(255,255,255,0.45)', letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 8 }}>{label}</div>
      {children}
    </div>
  );

  const Toggle = ({ label, k }) => (
    <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', marginBottom: 10 }}>
      <div onClick={() => set(k, !tweaks[k])} style={{
        width: 36, height: 20, borderRadius: 10, background: tweaks[k] ? tweaks.accentColor : 'rgba(255,255,255,0.15)',
        position: 'relative', transition: 'background 0.25s', flexShrink: 0,
      }}>
        <div style={{
          position: 'absolute', top: 3, left: tweaks[k] ? 18 : 3, width: 14, height: 14,
          borderRadius: '50%', background: '#fff', transition: 'left 0.25s',
        }} />
      </div>
      <span style={{ fontFamily: 'Montserrat', fontSize: 12, color: 'rgba(255,255,255,0.75)', fontWeight: 500 }}>{label}</span>
    </label>
  );

  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.navy, borderRadius: 16, padding: '24px',
      boxShadow: '0 8px 48px rgba(0,0,0,0.4)', width: 292,
      border: `1px solid rgba(255,255,255,0.1)`,
      maxHeight: '80vh', overflowY: 'auto',
    }}>
      <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 14, color: '#fff', marginBottom: 24, letterSpacing: 0.5 }}>Tweaks</div>

      <Row label="Accent Color">
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          {['#f7941d','#e05c1a','#f7c31d','#1d9ff7','#e84393','#22c55e','#a855f7'].map(c => (
            <div key={c} onClick={() => set('accentColor', c)} style={{
              width: 28, height: 28, borderRadius: '50%', background: c, cursor: 'pointer',
              border: tweaks.accentColor === c ? '3px solid #fff' : '3px solid transparent',
              transition: 'border 0.2s', boxShadow: '0 2px 6px rgba(0,0,0,0.3)',
            }} />
          ))}
        </div>
      </Row>

      <Row label="Button Shape">
        <div style={{ display: 'flex', gap: 8 }}>
          {[{label:'Rounded', v:10},{label:'Pill', v:99},{label:'Sharp', v:2}].map(({label,v}) => (
            <button key={v} onClick={() => set('buttonRadius', v)} style={{
              padding: '6px 14px', borderRadius: v, border: `1.5px solid ${tweaks.buttonRadius===v ? tweaks.accentColor : 'rgba(255,255,255,0.2)'}`,
              background: tweaks.buttonRadius===v ? tweaks.accentColor : 'transparent',
              color: '#fff', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 11,
              cursor: 'pointer', transition: 'all 0.2s',
            }}>{label}</button>
          ))}
        </div>
      </Row>

      <Row label="Heading Font">
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {[{label:'Montserrat', v:'montserrat'},{label:'Playfair', v:'playfair'},{label:'Oswald', v:'oswald'}].map(({label,v}) => (
            <button key={v} onClick={() => set('fontStyle', v)} style={{
              padding: '6px 14px', borderRadius: 6,
              border: `1.5px solid ${tweaks.fontStyle===v ? tweaks.accentColor : 'rgba(255,255,255,0.2)'}`,
              background: tweaks.fontStyle===v ? tweaks.accentColor : 'transparent',
              color: '#fff', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 11,
              cursor: 'pointer', transition: 'all 0.2s',
            }}>{label}</button>
          ))}
        </div>
      </Row>

      <Row label="About Section Background">
        <div style={{ display: 'flex', gap: 8 }}>
          {[{label:'Warm White', v:'offwhite'},{label:'Orange', v:'orange'},{label:'Navy', v:'navy'}].map(({label,v}) => (
            <button key={v} onClick={() => set('aboutBg', v)} style={{
              padding: '6px 12px', borderRadius: 6,
              border: `1.5px solid ${tweaks.aboutBg===v ? tweaks.accentColor : 'rgba(255,255,255,0.2)'}`,
              background: tweaks.aboutBg===v ? tweaks.accentColor : 'transparent',
              color: '#fff', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 10,
              cursor: 'pointer', transition: 'all 0.2s',
            }}>{label}</button>
          ))}
        </div>
      </Row>

      <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: 16, marginTop: 4 }}>
        <Toggle label="Show Top Banner" k="showBanner" />
        <Toggle label="Show Hero Stats" k="statsVisible" />
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <Banner tweaks={tweaks} />
      <Navbar tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <About tweaks={tweaks} />
      <Trainer tweaks={tweaks} />
      <Services tweaks={tweaks} />
      <Testimonials tweaks={tweaks} />
      <Contact tweaks={tweaks} />
      <Footer tweaks={tweaks} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
